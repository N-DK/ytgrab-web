<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Downloader</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --surface2: #1c1c27;
        --border: #2a2a3a;
        --accent: #6c5ce7;
        --accent2: #a29bfe;
        --red: #ff4757;
        --green: #2ed573;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --radius: 14px;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 20px 40px;
      }

      /* Background glow */
      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 400px;
        background: radial-gradient(
          ellipse,
          rgba(108, 92, 231, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      .container {
        width: 100%;
        max-width: 680px;
        position: relative;
        z-index: 1;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 48px;
      }

      .logo-icon {
        width: 38px;
        height: 38px;
        background: linear-gradient(135deg, var(--accent), #fd79a8);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .logo-text {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 18px;
        letter-spacing: -0.5px;
      }

      .logo-text span {
        color: var(--accent2);
      }

      h1 {
        font-size: 42px;
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -1.5px;
        margin-bottom: 12px;
      }

      h1 em {
        font-style: normal;
        background: linear-gradient(90deg, var(--accent2), #fd79a8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        color: var(--muted);
        font-size: 15px;
        margin-bottom: 40px;
        line-height: 1.6;
      }

      /* Input card */
      .input-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 16px;
      }

      .input-row {
        display: flex;
        gap: 10px;
      }

      .url-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }

      .url-input::placeholder {
        color: var(--muted);
      }
      .url-input:focus {
        border-color: var(--accent);
      }

      .btn {
        border: none;
        border-radius: 10px;
        padding: 14px 22px;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: #7d6ff0;
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Format tabs */
      .format-tabs {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .tab {
        padding: 7px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: "Inter", sans-serif;
      }

      .tab.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .quality-select {
        margin-left: auto;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 12px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }

      /* Result card */
      .result-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        display: none;
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-card.visible {
        display: block;
      }

      .video-info {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
      }

      .thumbnail {
        width: 120px;
        height: 68px;
        object-fit: cover;
        border-radius: 8px;
        background: var(--surface2);
        flex-shrink: 0;
      }

      .video-meta {
        flex: 1;
        min-width: 0;
      }

      .video-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .video-details {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .detail-badge {
        font-size: 12px;
        color: var(--muted);
        background: var(--surface2);
        padding: 3px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }

      /* Progress */
      .progress-wrap {
        margin-bottom: 16px;
        display: none;
      }

      .progress-wrap.visible {
        display: block;
      }

      .progress-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }

      .progress-bar {
        height: 4px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 4px;
        width: 0%;
        transition: width 0.3s;
        animation: shimmer 1.5s infinite;
        background-size: 200% 100%;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% center;
        }
        100% {
          background-position: -200% center;
        }
      }

      .download-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, var(--accent), #a55eea);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: "Inter", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .download-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .download-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Error */
      .error-msg {
        background: rgba(255, 71, 87, 0.1);
        border: 1px solid rgba(255, 71, 87, 0.3);
        border-radius: 10px;
        padding: 14px 16px;
        color: var(--red);
        font-size: 13px;
        display: none;
        margin-top: 12px;
      }

      .error-msg.visible {
        display: block;
      }

      /* How it works */
      .how {
        margin-top: 48px;
        padding-top: 40px;
        border-top: 1px solid var(--border);
      }

      .how-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 24px;
      }

      .steps {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .step {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
      }

      .step-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent2);
        margin-bottom: 8px;
      }

      .step-label {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .step-desc {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      @media (max-width: 500px) {
        h1 {
          font-size: 30px;
        }
        .steps {
          grid-template-columns: 1fr;
        }
        .input-row {
          flex-direction: column;
        }
        .video-info {
          flex-direction: column;
        }
        .thumbnail {
          width: 100%;
          height: 160px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <div class="logo-icon">▶</div>
        <div class="logo-text">yt<span>grab</span></div>
      </div>

      <h1>Download YouTube<br />thành <em>MP3 / MP4</em></h1>
      <p class="subtitle">
        Paste link YouTube vào đây. Server sẽ dùng yt-dlp + FFmpeg để extract và
        convert cho bạn.
      </p>

      <div class="input-card">
        <div class="input-row">
          <input
            class="url-input"
            id="urlInput"
            type="text"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn btn-primary" id="fetchBtn" onclick="fetchInfo()">
            Tìm video
          </button>
        </div>

        <div class="format-tabs">
          <button class="tab active" id="tab-mp3" onclick="setFormat('mp3')">
            🎵 MP3
          </button>
          <button class="tab" id="tab-mp4" onclick="setFormat('mp4')">
            🎬 MP4
          </button>
          <select class="quality-select" id="qualitySelect">
            <option value="320">320 kbps</option>
            <option value="192" selected>192 kbps</option>
            <option value="128">128 kbps</option>
            <option value="96">96 kbps</option>
          </select>
        </div>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <div class="result-card" id="resultCard">
        <div class="video-info">
          <img class="thumbnail" id="thumb" src="" alt="" />
          <div class="video-meta">
            <div class="video-title" id="videoTitle"></div>
            <div class="video-details">
              <span class="detail-badge" id="channelBadge"></span>
              <span class="detail-badge" id="durationBadge"></span>
              <span class="detail-badge" id="viewBadge"></span>
            </div>
          </div>
        </div>

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-label">
            <span id="progressLabel">Đang xử lý...</span>
            <span id="progressPct"></span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <button class="download-btn" id="downloadBtn" onclick="startDownload()">
          <span>⬇</span> <span id="downloadBtnText">Tải xuống</span>
        </button>
      </div>
    </div>

    <script>
      let currentFormat = "mp3";
      let currentInfo = null;

      function setFormat(f) {
        currentFormat = f;
        document
          .getElementById("tab-mp3")
          .classList.toggle("active", f === "mp3");
        document
          .getElementById("tab-mp4")
          .classList.toggle("active", f === "mp4");
        document.getElementById("qualitySelect").style.display =
          f === "mp3" ? "" : "none";
        if (currentInfo) updateDownloadBtn();
      }

      function updateDownloadBtn() {
        const f = currentFormat;
        document.getElementById("downloadBtnText").textContent =
          `Tải ${f.toUpperCase()} — ${currentInfo.title.slice(0, 40)}${currentInfo.title.length > 40 ? "..." : ""}`;
      }

      function formatDuration(s) {
        const m = Math.floor(s / 60),
          sec = s % 60;
        return `${m}:${sec.toString().padStart(2, "0")}`;
      }

      function formatViews(n) {
        if (!n) return "";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + "M views";
        if (n >= 1e3) return (n / 1e3).toFixed(0) + "K views";
        return n + " views";
      }

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.classList.add("visible");
      }

      function hideError() {
        document.getElementById("errorMsg").classList.remove("visible");
      }

      async function fetchInfo() {
        const url = document.getElementById("urlInput").value.trim();
        if (!url) return showError("Vui lòng nhập URL YouTube");
        hideError();

        const btn = document.getElementById("fetchBtn");
        btn.disabled = true;
        btn.textContent = "Đang tìm...";
        document.getElementById("resultCard").classList.remove("visible");

        try {
          const res = await fetch("/api/info?url=" + encodeURIComponent(url));
          const data = await res.json();
          if (!res.ok) return showError(data.error || "Lỗi không xác định");

          currentInfo = data;
          document.getElementById("thumb").src = data.thumbnail;
          document.getElementById("videoTitle").textContent = data.title;
          document.getElementById("channelBadge").textContent = data.channel;
          document.getElementById("durationBadge").textContent = formatDuration(
            data.duration,
          );
          document.getElementById("viewBadge").textContent = formatViews(
            data.view_count,
          );
          document.getElementById("resultCard").classList.add("visible");
          updateDownloadBtn();
        } catch (e) {
          showError("Không kết nối được server");
        } finally {
          btn.disabled = false;
          btn.textContent = "Tìm video";
        }
      }

      async function startDownload() {
        const url = document.getElementById("urlInput").value.trim();
        const quality = document.getElementById("qualitySelect").value;
        const btn = document.getElementById("downloadBtn");
        const progressWrap = document.getElementById("progressWrap");
        const progressFill = document.getElementById("progressFill");
        const progressLabel = document.getElementById("progressLabel");

        btn.disabled = true;
        progressWrap.classList.add("visible");
        progressLabel.textContent = "Server đang xử lý, chờ chút...";
        progressFill.style.width = "30%";

        // Animate progress bar
        let pct = 30;
        const interval = setInterval(() => {
          if (pct < 85) {
            pct += 2;
            progressFill.style.width = pct + "%";
          }
        }, 600);

        try {
          const apiUrl = `/api/download?url=${encodeURIComponent(url)}&format=${currentFormat}&quality=${quality}`;
          const res = await fetch(apiUrl);

          clearInterval(interval);
          progressFill.style.width = "100%";
          progressLabel.textContent = "Hoàn thành! Đang tải file...";

          if (!res.ok) {
            const err = await res.json();
            showError(err.error || "Download thất bại");
            return;
          }

          const blob = await res.blob();
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `${currentInfo?.title || "download"}.${currentFormat}`;
          a.click();
        } catch (e) {
          clearInterval(interval);
          showError("Lỗi khi tải file");
        } finally {
          setTimeout(() => {
            btn.disabled = false;
            progressWrap.classList.remove("visible");
            progressFill.style.width = "0%";
            progressLabel.textContent = "Đang xử lý...";
          }, 2000);
        }
      }

      // Enter key
      document.getElementById("urlInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") fetchInfo();
      });

      // Init
      setFormat("mp3");
    </script>
  </body>
</html>
